<!DOCTYPE HTML>
<html>
    <head>
        <title>Форма</title>
    </head>
    <body>
        <form action="">
            <table border="1" cellpadding="5">
                <caption align="left">
                    <b> Анкета web-разработчика </b>
                </caption>
                <tr>
                    <td>E-mail*</td>
                    <td>
                        <input type="email" required name="email">
                    </td>
                </tr>
                <tr>
                    <td>Пароль*</td>
                    <td>
                        <input type="password" required name="pass">
                    </td>
                </tr>
                <tr>
                    <td>Пол</td>
                    <td>
                        <input type="radio" name="gender" id="g1" val- ue="1">
                        <label for="g1">Мужчина</label>
                        <input type="radio" name="gender" id="g2" val- ue="2">
                        <label for="g2">Женщина</label>
                    </td>
                </tr>
                <tr>
                    <td>Год рождения</td>
                    <td>
                        <input type="date" size="1">
                    </td>
                </tr>
                <tr>
                    <td>Знание языков</td>
                    <td>
                        <input type="checkbox" name="languadg" val- ue="Inglish" checked>Английский<br>
                        <input type="checkbox" name="languadg" val- ue="Rushen">Русский<br>
                        <input type="checkbox" name="languadg" val- ue="Doich" checked>Немецкий<br>
                        <input type="checkbox" name="languadg" val- ue="Spain">Испанский<br>
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        <textarea name="description" cols="40" rows="10">Коротко о себе...	</textarea>
                    </td>
                </tr>
                <tr>
                    <td colspan="2">Поля отмеченные * обязательны к заполнению</td>
                </tr>
                <tr>
                    <td colspan="2">
                        <input type="submit" value="Отправить">
                        <button type="reset">Сбросить</button>
                    </td>
                </tr>
            </table>
        </form>
    </body>
</html>
